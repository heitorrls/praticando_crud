<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro de Pessoas</title>
    <link rel="stylesheet" href="css/output.css">
</head>
<body class="bg-slate-50 text-slate-800 font-sans antialiased min-h-screen p-6 lg:p-12">
    
    <div class="max-w-4xl mx-auto space-y-8">
        
        <h1 class="text-3xl font-bold text-slate-900 text-center">Cadastro de Pessoas</h1>

        <form action="/cadastrar" method="POST" class="bg-white p-6 md:p-8 rounded-2xl shadow-sm border border-slate-100 flex flex-col gap-5">
            <input type="hidden" id="id-usuario">
            
            <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
                <input type="text" name="nome" id="nome" placeholder="Digite o nome" 
                    class="w-full px-4 py-3 border border-slate-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition-colors bg-slate-50 hover:bg-white text-sm">
                
                <input type="text" name="sobrenome" id="sobrenome" placeholder="Digite o sobrenome" 
                    class="w-full px-4 py-3 border border-slate-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition-colors bg-slate-50 hover:bg-white text-sm">
            </div>

            <input type="email" name="email" id="email" placeholder="Digite o email" 
                class="w-full px-4 py-3 border border-slate-200 rounded-lg focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 transition-colors bg-slate-50 hover:bg-white text-sm">
            
            <input class="mt-2 w-full md:w-auto md:self-end bg-indigo-600 hover:bg-indigo-700 text-white font-medium py-3 px-8 rounded-lg transition-colors duration-200 shadow-sm cursor-pointer" type="submit" value="Cadastrar">
        </form>

        <div class="bg-white rounded-2xl shadow-sm border border-slate-100 overflow-hidden">
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse">
                    <thead class="bg-slate-50/50 border-b border-slate-200">
                        <tr>
                            <th class="py-4 px-6 text-sm font-semibold text-slate-500 uppercase tracking-wider">Nome</th>
                            <th class="py-4 px-6 text-sm font-semibold text-slate-500 uppercase tracking-wider">Sobrenome</th>
                            <th class="py-4 px-6 text-sm font-semibold text-slate-500 uppercase tracking-wider">Email</th>
                            <th class="py-4 px-6 text-sm font-semibold text-slate-500 uppercase tracking-wider text-center">Ações</th>
                        </tr>
                    </thead>
                    <tbody id="tabela-corpo" class="divide-y divide-slate-100">
                        </tbody>
                </table>
            </div>
        </div>

    </div>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="js/script.js"></script>
</body>
</html>
